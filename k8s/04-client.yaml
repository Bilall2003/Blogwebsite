apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-client
  namespace: blog
  labels:
    app: blog-client
spec:
  replicas: 2 # 2 replicas (creates a ReplicaSet managing 2 pods)
  selector:
    matchLabels:
      app: blog-client
  template:
    metadata:
      labels:
        app: blog-client
    spec:
      containers:
        - name: blog-client
          image: blog-client:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: blog-client
  namespace: blog
spec:
  type: NodePort # exposes the app outside the cluster
  selector:
    app: blog-client
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080 # browse to http://localhost:30080
